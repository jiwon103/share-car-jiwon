<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
  const images = document.querySelectorAll('.banner-img');
let currentIndex = 0;

function changeBanner() {
    images[currentIndex].classList.remove('active');
    
    currentIndex = (currentIndex + 1) % images.length;
    
    images[currentIndex].classList.add('active');
}

// 3초마다 이미지 전환
setInterval(changeBanner, 3000);

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRou7lOLzRsClUxJ22uKZgtxxtiZTUrIvgvrNTkTMQYkR5DwAOET-UYsusXd-C_alVh7vHsOwrqWLEW/pub?output=csv';

let cars = [];
const MAX_CARS_DISPLAY = 10;

function convertDriveUrl(url) {
  if (!url) return '';
  const regex = /\/d\/([a-zA-Z0-9_-]{25,})/;
  const match = url.match(regex);
  if (match && match[1]) {
    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
  }
  return url;
}

async function loadCarList() {
  const container = document.getElementById('car-list');

  try {
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    const results = Papa.parse(csvText, { header: true, skipEmptyLines: true });

    cars = results.data;
    container.innerHTML = '';

    appendCarsSlider();
    if (cars.length) startAutoSlide();

  } catch (err) {
    container.innerHTML = '데이터를 불러올 수 없습니다.';
  }
}

function appendCarsSlider() {
  const container = document.getElementById('car-list');
  const carsToShow = cars.slice(0, MAX_CARS_DISPLAY);

  carsToShow.forEach(car => {
    const imgSrc = convertDriveUrl(car.imageurl);

    const carElem = document.createElement('div');
    carElem.className = 'car-item';

    carElem.innerHTML = `
      <img class="car-img" src="${imgSrc}" alt="${car.model}">
      <div class="car-name">${car.model || '-'}</div>
      <div class="car-info">차종 : ${car.type || '-'}</div>
      <div class="car-info">연식 : ${car.year || '-'}</div>
      <div class="car-info">색상 : ${car.color || '-'}</div>
      <div class="car-info">유종 : ${car.fuel || '-'}</div>
      <div class="car-info">주행거리 : ${car.mileage || '-'}</div>
      <div class="car-info">가격  : ${car.price || '-'}</div>
    `;

    carElem.addEventListener('click', () => {
      document.getElementById('modal-img').src = imgSrc;
      document.getElementById('modal-title').textContent = car.model || '-';
      document.getElementById('modal-type').textContent = `차종 : ${car.type || '-'}`;
      document.getElementById('modal-year').textContent = `연식 : ${car.year || '-'}`;
      document.getElementById('modal-color').textContent = `색상 : ${car.color || '-'}`;
      document.getElementById('modal-fuel').textContent = `유종 : ${car.fuel || '-'}`;
      document.getElementById('modal-mileage').textContent = `주행거리 : ${car.mileage || '-'}`;
      document.getElementById('modal-price').textContent = `가격 : ${car.price || '-'}`;
      document.getElementById('car-modal').classList.add('show');
    });

    container.appendChild(carElem);
  });
}

function startAutoSlide() {
  const container = document.getElementById('car-list');
  const first = container.querySelector('.car-item');
  if (!first) return;

  let scrollPos = 0;
  const slideWidth = first.offsetWidth + 16;

  setInterval(() => {
    scrollPos += slideWidth;
    if (scrollPos > container.scrollWidth - container.clientWidth) scrollPos = 0;
    container.scrollTo({ left: scrollPos, behavior: 'smooth' });
  }, 5000);
}
// 미디어 변경 함수
function changeMedia(src) {
  const media = document.getElementById('main-media');
  media.src = src;
}

// 페이지 로드 시 첫 번째 영상 자동 세팅
  window.addEventListener('DOMContentLoaded', () => {
    const layer1 = document.getElementById('media-layer-1');
    
    // 1번 영상 주입 (영상 경로를 실제 파일명으로 확인하세요)
    layer1.innerHTML = `
      <video autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover;">
        <source src="image/video1.mp4" type="video/mp4">
      </video>`;
    
    // 첫 화면이므로 투명도를 1로 설정
    layer1.style.opacity = 1;
  });

let currentLayer = 1;

function switchMedia(src, type) {
  const layer1 = document.getElementById('media-layer-1');
  const layer2 = document.getElementById('media-layer-2');
  
  const nextLayer = currentLayer === 1 ? layer2 : layer1;
  const activeLayer = currentLayer === 1 ? layer1 : layer2;

  // 다음 레이어에 콘텐츠 삽입
  if (type === 'video') {
    nextLayer.innerHTML = `<video autoplay muted loop style="width:100%; height:100%; object-fit:cover;"><source src="${src}" type="video/mp4"></video>`;
  } else {
    nextLayer.innerHTML = `<img src="${src}" style="width:100%; height:100%; object-fit:cover;">`;
  }

  // 교차 전환 (Opacity 조절)
  nextLayer.style.opacity = 1;
  activeLayer.style.opacity = 0;

  currentLayer = currentLayer === 1 ? 2 : 1;
}
